<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
}

.quiz-container {
    width: 90%;
    max-width: 700px;
    height: 70vh;
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
}
.answers {
    overflow-y: auto;
}

h2 {
    text-align: center;
}

.answers button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    text-align: left;
    white-space: normal;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.answers button:hover {
    opacity: 0.85;
}

.correct {
    background-color: #4CAF50;
    color: white;
}

.wrong {
    background-color: #f44336;
    color: white;
}

#explanation {
    margin-top: 10px;
    font-size: 16px;
    color: #333;
}

#nextBtn {
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Question here</h2>

    <div class="answers" id="answers"></div>

    <p id="explanation"></p>

    <button id="nextBtn" onclick="nextQuestion()">Next</button>
</div>

<script>
const quiz = [
    {
        question: "1. What is the oldest written record in the Philippines",
        answers: [
            { text: "A. Boxer Codex", correct: false },
            { text: "B. Doctrina Christiana", correct: false },
            { text: "C. Code of Kalantiaw", correct: false },
            { text: "D. Laguna Copperplate Inscription", correct: true}
        ],
        explanation: ""
    },
    {
        question: "2. In what year was the Laguna Copperplate Inscription written?",
        answers: [
            { text: "A. 600 CE", correct: false },
            { text: "B. 700 CE", correct: false },
            { text: "C. 800 CE", correct: false },
            { text: "D. 900 CE", correct: true}
        ],
        explanation: ""
    },
    {
        question: "3. Where was the Laguna Copperplate Inscription discovered?",
        answers: [
            { text: "A. Cebu", correct: false },
            { text: "B. Near Laguna de Bay", correct: true },
            { text: "C. Butuan", correct: false },
            { text: "D.  Vigan", correct: false }
        ],
        explanation: ""
    },
    {
        question: "4. Who translated the Laguna Copperplate Inscription?",
        answers: [
            { text: "A. Jose Rizal", correct: false },
            { text: "B. Antonio Pigafetta", correct: false },
            { text: "C. William Henry Scott", correct: false },
            { text: "D. Antoon Postma", correct: true}
        ],
        explanation: ""
    },
    {
        question: "5. What material is the Laguna Copperplate Inscription made of?",
        answers: [
            { text: "A. Gold", correct: false },
            { text: "B. Stone", correct: false },
            { text: "C. Wood", correct: false },
            { text: "D. Copper", correct: true}
        ],
        explanation: ""
    },
    {
        question: "6. Who colonized the Philippines during the period discussed in the lesson?",
        answers: [
            { text: "A. Spain", correct: false },
            { text: "B. Japan", correct: false },
            { text: "C. United States", correct: true },
            { text: "D. China", correct: false }
        ],
        explanation: ""
    },
    {
        question: "7. What was the purpose of the Commonwealth period in the Philippines?",
        answers: [
            { text: "A. To prepare the country for independence", correct: true },
            { text: "B. To start a war", correct: false },
            { text: "C. To return control to Spain", correct: false },
            { text: "D. To divide the country", correct: false}
        ],
        explanation: ""
    },
    {
        question: "8. What is a homestead?",
        answers: [
            { text: "A. A type of government building", correct: false },
            { text: "B. A house and the farmland it is on", correct: true },
            { text: "C. A school in rural areas", correct: false },
            { text: "D. A business establishment", correct: false }
        ],
        explanation: ""
    },
    {
        question: "9. What was one effect of homesteading on the Moros?",
        answers: [
            { text: "A. They became richer", correct: false },
            { text: "B. They were displaced from their lands", correct: true },
            { text: "C. They gained more political power", correct: false },
            { text: "D. They stopped farming", correct: false }
        ],
        explanation: ""
    },
    {
        question: "10. What happened during the Commonwealth period?",
        answers: [
            { text: "A. The Philippines became fully independent immediately", correct: false },
            { text: "B. It was a transition period preparing for independence", correct: true },
            { text: "C. The country was ruled by Spain again", correct: false },
            { text: "D. There were no changes in government", correct: false }
        ],
        explanation: ""
    },
    {
        question: "11. What is the oldest written source of Philippine history?",
        answers: [
            { text: "A. Chu Fan Chi", correct: false },
            { text: "B. Laguna Copperplate Inscription (LCI)", correct: true },
            { text: "C. Pigafetta's Voyage", correct: false },
            { text: "D. Labor Evangelica", correct: false }
        ],
        explanation: "Reference: Lesson 5, page 35 "
    },
    {
        question: "12. Which key concept refers to exchange of goods transported by sea in pre-16th century Southeast Asia?",
        answers: [
            { text: "A. Social structure", correct: false },
            { text: "B. Maritime trade", correct: true },
            { text: "C. Age of European exploration", correct: false },
            { text: "D. Colonial expansion", correct: false }
        ],
        explanation: "Reference: Lesson 5, page 35"
    },
    {
        question: "13. Which Chinese work mentions trade with a Philippine region called Ma-i?",
        answers: [
            { text: "A. Records of the Grand Historian", correct: false },
            { text: "B. Chu Fan Chi", correct: true },
            { text: "C. The Travels of Marco Polo", correct: false },
            { text: "D. Book of Songs", correct: false }
        ],
        explanation: ""
    },
    {
        question: "14. What material was the LCI etched on?",
        answers: [
            { text: "A. Bamboo", correct: false },
            { text: "B. Palm leaf", correct: false },
            { text: "C. Copper", correct: true },
            { text: "D. Stone", correct: false}
        ],
        explanation: "Reference: Lesson 5, page 36"
    },
    {
        question: "15. What did Pigafetta call the island now known as Samar?",
        answers: [
            { text: "A. Zamal", correct: true },
            { text: "B. Humunu", correct: false },
            { text: "C. Zubu", correct: false },
            { text: "D. Mactan", correct: false }
        ],
        explanation: "Reference: Lesson 5, page 41"
    },
    {
        question: "1. According to the passage, how was the relationship between the United States and Filipino political parties depicted in political cartoons during the American period?",
        answers: [
            { text: "A. The United States refused to support any Filipino political party.", correct: false },
            { text: "B. Uncle Sam supported the Federalista Party. ", correct: true },
            { text: "C. Filipino political parties operated independently without any American influence.", correct: false },
            { text: "D. The Nacionalista Party was immediately given full control by the United States.", correct: false}
        ],
        explanation: "Analysis of the Political Caricatures and Comic Strips - Page 100"
    },
    {
        question: "2. What was one main reason the Spanish wanted to control Jolo and Mindanao?",
        answers: [
            { text: "a. To promote tourism, Tourism was not practiced during that time, as travel was mainly for trade and conquest.", correct: false },
            { text: "b. To spread education, Education was not the main focus; the Spanish had other priorities in mind.", correct: false },
            { text: "c. For strategic trade and natural resources, They wanted control for trade and resources.", correct: true },
            { text: "d. To build cities, Although they built settlements, this was not the main reason mentioned in the text.", correct: false }
        ],
        explanation: "Francisco de Sande's Letter to Estevan Rodriguez de Figueroa- Page 59"
    },
    {
        question: "3. Why did Corazon Aquino become a symbol of democracy in the Philippines?",
        answers: [
            { text: "A. Because she came from a wealthy family She was from a rich background, but this was not the main reason she symbolized democracy.", correct: false },
            { text: "B. Because she led a violent revolution The revolution she was associated with was peaceful, not violent.", correct: false },
            { text: "C. Because she restored democracy after the Marcos dictatorship", correct: true },
            { text: "D. Because she had long political experience She had little to no political experience before becoming president.", correct: false}
        ],
        explanation: "Corazon Aquino's Speech before the U.S Congress- Page 114-115"
    },
    {
        question: "4. Which of the following statements best explains the sequence of leadership and major events during the early and later stages of the Philippine Revolution?",
        answers: [
            { text: "A. The revolution began in 1898 under Emilio Aguinaldo, following the peaceful reforms initiated by the Katipunan, and ended with the exile of Andres Bonifacio.", correct: false },
            { text: "B. The revolution started in August 1896 after the discovery of the Katipunan, was initially led by Andres Bonifacio, and later saw internal conflicts that resulted in Bonifacios execution in May 1897 and the rise of Emilio Aguinaldo.", correct: true },
            { text: "C. The Philippine Revolution was led entirely by Emilio Aguinaldo from the beginning, with no internal conflicts, and concluded immediately after the declaration of independence.", correct: false },
            { text: "D. The revolution began due to foreign intervention, with Andres Bonifacio taking control only after Emilio Aguinaldo stepped down in 1897.", correct: false }
        ],
        explanation: "Selected Primary Sources on the Philippine Revolution: The Kartilya ng Katipunan, Emilio Aguinaldo's Mga Gunita ng Himagsikan, and the Declaration of Philippine Independence - page 72"
    },
    {
        question: "5. Why did Filipino leaders oppose the appointment of Leonard Wood as governor-general in 1921?",
        answers: [
            { text: "A. He supported Filipino independence and gave more power to local leaders.", correct: false },
            { text: "B. He limited the power of Filipino politicians, vetoed their laws, and appointed Americans to important positions.", correct: true },
            { text: "C. He immediately granted independence to the Philippines without consulting Filipino leaders.", correct: false },
            { text: "D. He allowed Filipinos to fully control the government and military.", correct: false }
        ],
        explanation: "Filipino Grievances Against Governor-General wood- page 86"
    },
];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const explanationEl = document.getElementById("explanation");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion() {
    nextBtn.style.display = "none";
    answersEl.innerHTML = "";
    explanationEl.textContent = "";

    const q = quiz[currentQuestion];
    questionEl.textContent = q.question;

    const container = document.querySelector(".quiz-container");

    if (currentQuestion <= 14) {
        container.style.background = "#90EE90";
    } else if (currentQuestion <= 19) {
        container.style.background = "#FFD580";
    } else {
        container.style.background = "#FFCCCB";
    }

    q.answers.forEach(answer => {
        const btn = document.createElement("button");
        btn.textContent = answer.text;

        btn.onclick = () => checkAnswer(btn, answer.correct);

        answersEl.appendChild(btn);
    });
}

function checkAnswer(button, isCorrect) {
    if (isCorrect) {
        button.classList.add("correct");
        score++;

        const buttons = answersEl.querySelectorAll("button");
        buttons.forEach(btn => btn.disabled = true);

        explanationEl.textContent = quiz[currentQuestion].explanation;

        nextBtn.style.display = "block";
    } else {
        button.classList.add("wrong");

        setTimeout(() => {
            button.classList.remove("wrong");
        }, 600);
    }
}

function nextQuestion() {
    if (nextBtn.textContent === "Restart") {
        currentQuestion = 0;
        score = 0;
        nextBtn.textContent = "Next";
        loadQuestion();
        return;
    }

    currentQuestion++;

    if (currentQuestion < quiz.length) {
        loadQuestion();
    } else {
        showScore();
    }
}
function showScore() {
    questionEl.textContent = "Want to begin again?";
    answersEl.innerHTML = "";
    explanationEl.textContent = `Your Score: ${score} out of ${quiz.length}`;

    nextBtn.style.display = "block";
    nextBtn.textContent = "Restart";
}

loadQuestion();
</script>

</body>
</html>
